# ALSTM-Alpha360 hyperparameters (locked per spec §5).
# β simplification: trains qlib's stock single-output ALSTM 3× per weekly run
# (once per horizon). True label-multi-head sharing is a γ optimization.
#
# IMPORTANT: uses qlib's non-`_ts` ALSTM variant + plain DatasetH (the
# canonical Alpha360 config — see examples/benchmarks/ALSTM/
# workflow_config_alstm_Alpha360.yaml). The non-`_ts` model internally
# reshapes Alpha360's 360 flat cols into (batch, d_feat=6, lookback=60).
# Using `pytorch_alstm_ts` + TSDatasetH would produce shape
# (batch, step_len, 360) and crash on the 6×64 fc_in layer.

model:
  class: ALSTM
  module_path: qlib.contrib.model.pytorch_alstm
  kwargs:
    d_feat: 6
    hidden_size: 64
    num_layers: 2
    dropout: 0.0
    n_epochs: 100
    lr: 0.001
    early_stop: 20
    batch_size: 2048
    metric: "loss"
    loss: "mse"
    GPU: 0
    seed: 0

handler:
  class: Alpha360_OpenH
  module_path: custom_handler
  # learn_processors and infer_processors are merged into handler kwargs at
  # runtime by _build_multihead_dataset in train_alstm.py.

learn_processors:
  # CSRankNorm was added on 2026-05-28 hoping to match qlib's canonical
  # ALSTM Alpha360 setup. EMPIRICAL RESULT on 4-week backfill
  # (2026-05-01..05-22, 8800 samples, csi800): ALSTM 5d IC -0.041 and
  # ALSTM 20d IC -0.027 — both turned negative, dragging ensemble IC
  # from baseline +0.034 to -0.005. Reverting. Hypothesis: rank-norm
  # MSE loss interacts badly with our open-to-open horizon labels
  # (Ref($open,-N+1)/Ref($open,-1)-1) on our shorter training window
  # (3-5y vs canonical 7y). Re-add only with paired evaluation.
  - class: DropnaLabel

infer_processors:
  - class: RobustZScoreNorm
    kwargs:
      fields_group: feature
      clip_outlier: true
  - class: Fillna
    kwargs:
      fields_group: feature

# grad_clip_max_norm=3.0 is enforced inside qlib's pytorch_alstm.ALSTM via
# `torch.nn.utils.clip_grad_value_(self.ALSTM_model.parameters(), 3.0)`.
# Kept here for documentation; not consumed by training code (γ TODO).
grad_clip_max_norm: 3.0
