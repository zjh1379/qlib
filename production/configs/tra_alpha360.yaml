# TRA-Alpha360 hyperparameters (locked per spec §5).
# β simplification: trains qlib's stock TRA 3× per weekly run (once per horizon).
# True label-multi-head sharing is a γ optimization.

model:
  class: TRAModel
  module_path: qlib.contrib.model.pytorch_tra
  kwargs:
    # NOTE: TRAModel doesn't accept `batch_size` or `GPU` — `batch_size`
    # belongs to MTSDatasetH's dataset config (not used by this β
    # pipeline), and TRA uses torch's default device selection.
    # The intended batch_size=1024 from the original spec is documented
    # here as a γ TODO if/when we adopt MTSDatasetH.
    model_type: RNN
    n_epochs: 100
    lr: 0.001
    early_stop: 20
    seed: 0
    lamb: 1.0
    rho: 0.99
    alpha: 1.0
    transport_method: oracle
    model_config:
      input_size: 6
      hidden_size: 64
      num_layers: 2
      use_attn: true
      dropout: 0.0
    tra_config:
      num_states: 10
      hidden_size: 16
      tau: 1.0
      src_info: LR_TPE

handler:
  class: Alpha360_OpenH
  module_path: custom_handler

learn_processors:
  - class: DropnaLabel

infer_processors:
  - class: RobustZScoreNorm
    kwargs:
      fields_group: feature
      clip_outlier: true
  - class: Fillna
    kwargs:
      fields_group: feature

step_len: 20
grad_clip_max_norm: 3.0
