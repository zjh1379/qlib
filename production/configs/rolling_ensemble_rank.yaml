# LambdaRank experiment config. IDENTICAL to rolling_ensemble.yaml except
# experiment_name — isolates the rank LGBM recorders into their own mlflow
# experiment so the rank backfill does not skip via / contaminate the baseline
# or factor recorders. Used with --objective lambdarank --features shortterm.
# Compare pooled oof_lgbmrank_* vs the factor baseline (oof_lgbmfac / +31% 2model).

experiment_name: rolling_v2_ensemble_rank

universe: csi800
universe_extras:
  - etfs
  - custom
provider_uri: ~/.qlib/qlib_data/cn_data_bs
region: cn

horizons:
  - name: "1d"
    horizon_days: 1
    train_years: 3
    valid_years: 1
    stack_years: 1
    test_weeks: 1
  - name: "5d"
    horizon_days: 5
    train_years: 5
    valid_years: 1
    stack_years: 1
    test_weeks: 1
  - name: "20d"
    horizon_days: 20
    train_years: 7
    valid_years: 1
    stack_years: 1
    test_weeks: 1

models:
  - id: lgbm
    config: production/configs/lgbm_alpha158_multi.yaml
    enabled: true
  - id: alstm
    config: production/configs/alstm_alpha360.yaml
    enabled: true
  - id: tra
    config: production/configs/tra_alpha360.yaml
    enabled: true

post_process:
  ewma_alpha: 0.5
  cost_bps: 10

mlruns_archive:
  keep_weeks: 8
